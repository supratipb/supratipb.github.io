    /* ── Design Tokens ── */
    :root {
      --bg:          #f5f6f8;
      --surface:     #ffffff;
      --surface-2:   #f0f2f5;
      --border:      #e2e5ea;
      --accent:      #2563eb;
      --accent-dim:  rgba(37, 99, 235, 0.08);
      --text-primary:   #111318;
      --text-secondary: #5a6172;
      --text-muted:     #9aa0ad;
      --radius:      12px;
      --radius-sm:   8px;
      --font-body:   'DM Sans', sans-serif;
      --font-mono:   'DM Mono', monospace;
      --transition:  0.2s ease;
      --max-w:       1100px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; transition: opacity var(--transition); }
    a:hover { opacity: 0.75; }
    img { display: block; max-width: 100%; }

    /* ── Layout Helpers ── */
    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      max-width: var(--max-w);
      margin: 0 auto;
    }
    .profile-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-title {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }
    .social-links {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .social-links a {
      color: var(--text-secondary);
      font-size: 15px;
      transition: color var(--transition);
    }
    .social-links a:hover { color: var(--accent); opacity: 1; }

    /* ── Nav ── */
    .site-nav {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }
    .nav-link {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: var(--font-mono);
      letter-spacing: 0.03em;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--accent);
      border-color: var(--border);
      background: var(--surface-2);
      opacity: 1;
    }

    /* ── Hamburger ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      background: none;
      border: none;
      margin-left: auto;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-secondary);
      border-radius: 2px;
      transition: all var(--transition);
    }
    .mobile-nav {
      display: none;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px 16px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .mobile-nav.open { display: flex; }

    /* ── Main ── */
    .main { padding: 40px 0 80px; }

    /* ── Filter Bar ── */
    .filter-section { margin-bottom: 32px; }
    .filter-label {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-btn {
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.03em;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      font-weight: 500;
    }

    /* ── Cert Count ── */
    .cert-count {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-top: 12px;
    }
    .cert-count span { color: var(--accent); }

    /* ── Section Group ── */
    .cert-group { margin-bottom: 48px; }
    .group-label {
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .group-label::before {
      content: '';
      display: block;
      width: 3px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── Cert Grid ── */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Cert Card ── */
    .cert-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: border-color var(--transition), background var(--transition), transform var(--transition);
      animation: fadeUp 0.35s ease both;
    }
    .cert-card:hover {
      border-color: var(--accent);
      background: var(--surface-2);
      transform: translateY(-2px);
    }
    .cert-card.hidden { display: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cert-badge {
      width: 56px;
      height: 56px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 8px;
    }
    .cert-info { flex: 1; min-width: 0; }
    .cert-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .cert-issuer {
      font-size: 12px;
      color: var(--accent);
      font-family: var(--font-mono);
      margin-bottom: 4px;
    }
    .cert-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-family: var(--font-mono);
    }
    .cert-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      transition: all var(--transition);
    }
    .cert-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
      opacity: 1;
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; gap: 12px; }
      .site-nav { display: none; }
      .hamburger { display: flex; }
      .cert-grid { grid-template-columns: 1fr; }
      .profile-name { font-size: 15px; }
    }
    @media (max-width: 480px) {
      .social-links { gap: 10px; }
      .filter-btn { font-size: 11px; padding: 4px 10px; }
    }
  </style>
</head>

// ─────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────

function certCard(cert, delay) {
  const link = cert.url
    ? `<a class="cert-link" href="${cert.url}" target="_blank" rel="noopener">
         <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:9px"></i> See credential
       </a>`
    : '';
  return `
    <article class="cert-card" data-group="${cert.group}" style="animation-delay:${delay}ms">
      <img class="cert-badge" src="${cert.icon}" alt="${cert.name} badge" loading="lazy" />
      <div class="cert-info">
        <div class="cert-name">${cert.name}</div>
        <div class="cert-issuer">${cert.issuer}</div>
        <div class="cert-date">${cert.date}</div>
        ${link}
      </div>
    </article>`;
}

function render(filter) {
  const board = document.getElementById('certBoard');
  const countEl = document.getElementById('certCount');

  // Group certs
  const groups = {};
  let visibleCount = 0;
  CERTIFICATIONS.forEach(cert => {
    const match = filter === 'all' || cert.group === filter;
    if (!match) return;
    if (!groups[cert.group]) groups[cert.group] = [];
    groups[cert.group].push(cert);
    visibleCount++;
  });

  let html = '';
  let globalDelay = 0;
  Object.entries(groups).forEach(([group, certs]) => {
    html += `<section class="cert-group">
      <div class="group-label">${group}</div>
      <div class="cert-grid">`;
    certs.forEach(cert => {
      html += certCard(cert, globalDelay);
      globalDelay += 30;
    });
    html += `</div></section>`;
  });

  board.innerHTML = html;
  countEl.innerHTML = `Showing <span>${visibleCount}</span> of <span>${CERTIFICATIONS.length}</span> certifications`;
}

function buildFilters() {
  const groups = ['all', ...new Set(CERTIFICATIONS.map(c => c.group))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = groups.map(g =>
    `<button class="filter-btn${g === 'all' ? ' active' : ''}" data-filter="${g}">
      ${g === 'all' ? 'All' : g}
     </button>`
  ).join('');

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
  });
}

// Hamburger
document.getElementById('hamburgerBtn').addEventListener('click', function () {
  const nav = document.getElementById('mobileNav');
  const open = nav.classList.toggle('open');
  this.setAttribute('aria-expanded', open);
});

// Init
document.getElementById('year').textContent = new Date().getFullYear();
buildFilters();
render('all');
</script>
